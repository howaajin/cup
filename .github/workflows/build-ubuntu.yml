name: Ubuntu Build

on:
  push:
    branches: [nightly, main]
  pull_request:
    branches: [nightly, main]

jobs:
  build:
    strategy:
      matrix:
        arch: [x64, x86]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: |
          LLVM_AR=$(ls /usr/bin/llvm-ar-* | sort -V | tail -n1)
          echo "Using: $LLVM_AR"
          sudo ln -sf "$LLVM_AR" /usr/bin/llvm-ar
          llvm-ar --version
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq gcc-multilib
          fi

      - name: Bootstrap
        run: ./bootstrap.sh ${{ matrix.arch == 'x86' && '-arch x86' || '' }}

      - name: Build
        run: ./cup -t llvm -O3

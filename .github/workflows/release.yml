name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x86
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x86
          - os: macos-14
            platform: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup (Linux)
        if: matrix.platform == 'linux'
        run: |
          LLVM_AR=$(ls /usr/bin/llvm-ar-* | sort -V | tail -n1)
          echo "Using: $LLVM_AR"
          sudo ln -sf "$LLVM_AR" /usr/bin/llvm-ar
          llvm-ar --version
          if [ "${{ matrix.arch }}" = "x86" ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq gcc-multilib
          fi

      - name: Bootstrap (Linux)
        if: matrix.platform == 'linux'
        run: ./bootstrap.sh ${{ matrix.arch == 'x86' && '-arch x86' || '' }}

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: ./cup -t llvm -O3

      - name: Bootstrap (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: bootstrap.bat${{ matrix.arch == 'x86' && ' -arch x86' || '' }}

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: .\cup.exe -t msvc -O3

      - name: Bootstrap (macOS)
        if: matrix.platform == 'macos'
        run: ./bootstrap.sh

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: ./cup -t llvm -O3

      - name: Stage Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          mkdir -p _release
          cp build/embedded/cup _release/cup-linux-${{ matrix.arch }}
          cp build/header_only/cup.h _release/

      - name: Stage Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path _release -Force > $null
          Copy-Item build/embedded/cup.exe _release/cup-windows-${{ matrix.arch }}.exe

      - name: Stage macOS artifacts
        if: matrix.platform == 'macos'
        run: |
          mkdir -p _release
          cp build/embedded/cup _release/cup-macos

      - uses: actions/upload-artifact@v4
        with:
          name: cup-${{ matrix.platform }}-${{ matrix.arch || 'arm64' }}
          path: _release/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Delete existing release (if any)
        run: gh release delete "$TAG" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}

      - name: Create release
        run: gh release create "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}

      - name: Upload release assets
        run: |
          sleep 3
          gh release upload "$TAG" --clobber \
            "_artifacts/cup-linux-x64/cup-linux-x64#cup Linux (x64)" \
            "_artifacts/cup-linux-x86/cup-linux-x86#cup Linux (x86)" \
            "_artifacts/cup-linux-x64/cup.h#cup.h" \
            "_artifacts/cup-windows-x64/cup-windows-x64.exe#cup Windows (x64).exe" \
            "_artifacts/cup-windows-x86/cup-windows-x86.exe#cup Windows (x86).exe" \
            "_artifacts/cup-macos-arm64/cup-macos#cup macOS (arm64)"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}

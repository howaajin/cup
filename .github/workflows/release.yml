name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup (Linux)
        if: matrix.platform == 'linux'
        run: |
          LLVM_AR=$(ls /usr/bin/llvm-ar-* | sort -V | tail -n1)
          echo "Using: $LLVM_AR"
          sudo ln -sf "$LLVM_AR" /usr/bin/llvm-ar
          llvm-ar --version

      - name: Bootstrap (Linux)
        if: matrix.platform == 'linux'
        run: ./bootstrap.sh

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: ./cup -t llvm -O3

      - name: Bootstrap (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: bootstrap.bat

      - name: Build (Windows)
        if: matrix.platform == 'windows'
        run: .\cup.exe -t msvc -O3

      - name: Bootstrap (macOS)
        if: matrix.platform == 'macos'
        run: ./bootstrap.sh

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: ./cup -t llvm -O3

      - name: Stage Linux artifacts
        if: matrix.platform == 'linux'
        run: |
          mkdir -p _release
          cp build/embedded/cup _release/
          cp build/header_only/cup.h _release/

      - name: Stage Windows artifacts
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path _release -Force > $null
          Copy-Item build/embedded/cup.exe _release/

      - name: Stage macOS artifacts
        if: matrix.platform == 'macos'
        run: |
          mkdir -p _release
          cp build/embedded/cup _release/cup-macos

      - uses: actions/upload-artifact@v4
        with:
          name: cup-${{ matrix.platform }}
          path: _release/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Delete existing release (if any)
        run: gh release delete "$TAG" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}

      - name: Create release
        run: gh release create "$TAG" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}

      - name: Upload release assets
        run: |
          sleep 3
          gh release upload "$TAG" --clobber \
            "_artifacts/cup-linux/cup#cup Linux (x64)" \
            "_artifacts/cup-linux/cup.h#cup.h" \
            "_artifacts/cup-windows/cup.exe#cup Windows (x64)" \
            "_artifacts/cup-macos/cup-macos#cup macOS (x64)"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag }}
